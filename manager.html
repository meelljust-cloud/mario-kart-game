<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Manager PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body {
 font-family: Arial;
 background:#0d0d0d;
 color:white;
 text-align:center;
}

h1 {
 color:gold;
}

.card {
 background:#1e1e1e;
 padding:12px;
 margin:8px;
 border-radius:10px;
}

.leader {
 background: gold;
 color:black;
 font-weight:bold;
}

.track {
 background:#333;
 height:20px;
 border-radius:10px;
 margin-top:5px;
}

.kart {
 height:100%;
 background:limegreen;
 border-radius:10px;
}

button {
 padding:10px;
 margin:10px;
 border:none;
 border-radius:8px;
 font-size:15px;
 cursor:pointer;
}

.reset {
 background:red;
 color:white;
 font-weight:bold;
}

.clear {
 background:orange;
 color:black;
}
</style>

</head>

<body>

<h1>📊 Dashboard Manager</h1>

<button class="reset" onclick="confirmReset()">🧨 Reset Course</button>
<button class="clear" onclick="clearActions()">🧹 Clear Actions</button>

<div id="stats"></div>
<div id="actions"></div>

<script>

// ✅ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDybWbfjdDCwE4y8FmaAMd06fncMhI3A",
  authDomain: "mario-kart-f2dc5.firebaseapp.com",
  projectId: "mario-kart-f2dc5",
  databaseURL: "https://mario-kart-f2dc5-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const FINISH = 2000;

// ✅ RESET
function confirmReset(){
 if(confirm("⚠️ Reset complet de la course ?")){
   resetGame();
 }
}

// ✅ RESET COURSE
function resetGame(){

 const freshData = {
  "Beatriz Gomes": 0,
  "Malorie Ghyselinck": 0,
  "Nelson Mendes": 0,
  "Sylvia Sylva": 0,
  "Thierry Yansounou": 0,
  "Nicolas Catherine-Duchemin": 0,
  "Hicham Abourouh": 0,
  "Brayan Mercier": 0,
  "Vincent Fevry": 0,
  "Marc Monteiro": 0,
  "Marie Audouin": 0,
  "Mounira Oudad": 0,
  "Henrique Oliveira": 0,
  "Lucas Launay": 0
 };

 db.ref("game").set(freshData);
 db.ref("actions").set(null);

 alert("✅ Nouvelle course !");
}

// ✅ CLEAR ACTIONS
function clearActions(){
 if(confirm("Supprimer l'historique ?")){
   db.ref("actions").set(null);
 }
}

// ✅ SCORES LIVE
db.ref("game").on("value", snap => {

 const data = snap.val() || {};

 const players = Object.keys(data).map(name => ({
   name,
   score: data[name]
 }));

 // ✅ TRI CLASSEMENT
 players.sort((a,b)=>b.score-a.score);

 let html = "<h2>🏆 Classement</h2>";

 players.forEach((p,i)=>{

   const percent = Math.min((p.score / FINISH) * 100, 100);

   html += `
   <div class="card ${i===0 ? "leader":""}">
     ${i+1}. ${p.name} → ${p.score}

     <div class="track">
       <div class="kart" style="width:${percent}%"></div>
     </div>

   </div>
   `;
 });

 document.getElementById("stats").innerHTML = html;

});

// ✅ ACTIVITÉ LIVE
db.ref("actions").limitToLast(20).on("value", snap => {

 const data = snap.val() || {};
 let html = "<h2>📈 Activité récente</h2>";

 Object.values(data).reverse().forEach(a => {
   html += `
   <div class="card">
     ${a.time} - ${a.agent} → ${a.value > 0 ? "+" : ""}${a.value}
   </div>`;
 });

 document.getElementById("actions").innerHTML = html;

});

</script>

</body>
</html>
``
