<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Manager</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center }
.card { background:#1e1e1e; padding:15px; margin:10px; border-radius:10px }
</style>

</head>
<body>

<h1>📊 Dashboard Manager</h1>

<div id="stats"></div>
<div id="actions"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDybWbfjdDCwE4y8FmaAMd06fncMhI3A",
  authDomain: "mario-kart-f2dc5.firebaseapp.com",
  projectId: "mario-kart-f2dc5",
  databaseURL: "https://mario-kart-f2dc5-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 📊 SCORES
db.ref("game").on("value", snap => {
 const data = snap.val() || {};

 let html = "<h2>🏆 Scores</h2>";

 Object.keys(data).forEach(name=>{
   html += `<div class="card">${name} : ${data[name]}</div>`;
 });

 document.getElementById("stats").innerHTML = html;
});


// 📈 ACTIVITÉ
db.ref("actions").limitToLast(20).on("value", snap => {
 const data = snap.val() || {};

 let html = "<h2>📊 Activité récente</h2>";

 Object.values(data).reverse().forEach(a => {
   html += `
   <div class="card">
     ${a.time} — ${a.agent} → ${a.value > 0 ? "+" : ""}${a.value}
   </div>`;
 });

 document.getElementById("actions").innerHTML = html;
});

</script>

</body>
</html>
``
