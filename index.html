<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mario Kart LIVE</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#0d0d0d; color:white; text-align:center }
.card { background:#1e1e1e; padding:15px; margin:10px; border-radius:12px }
.gold { border:3px solid gold }
.track { background:#333; height:35px; border-radius:20px; position:relative; margin-top:10px }
.kart { position:absolute; top:2px; font-size:24px; transition:0.4s }
.rules { background:#222; padding:12px; margin:15px auto; width:80%; border-radius:10px }
.leader { background:gold; color:black; padding:10px; margin:10px; border-radius:10px }
select { padding:8px; margin:10px; border-radius:8px }
</style>

</head>

<body>

<h2>👤 Choisis ton nom</h2>

<select id="userSelect">
  <option value="">-- Choisis ton nom --</option>
  <option>Beatriz Gomes</option>
  <option>Malorie Ghyselinck</option>
  <option>Nelson Mendes</option>
  <option>Sylvia Sylva</option>
  <option>Thierry Yansounou</option>
</select>

<div id="welcome"></div>

<div id="app">Chargement...</div>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDybWbfjdDCwE4y8FmaAMd06fncMhI3A",
  authDomain: "mario-kart-f2dc5.firebaseapp.com",
  projectId: "mario-kart-f2dc5",
  databaseURL: "https://mario-kart-f2dc5-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const FINISH = 2000;
let currentLeader = null;
let currentUser = "";

// AGENTS
const agents = [
 {name:"Beatriz Gomes", kart:"🏎️"},
 {name:"Malorie Ghyselinck", kart:"🚗"},
 {name:"Nelson Mendes", kart:"🚙"},
 {name:"Sylvia Sylva", kart:"🚕"},
 {name:"Thierry Yansounou", kart:"🚓"}
];

// 👤 sélection utilisateur + REFRESH FIX ✅
document.getElementById("userSelect").addEventListener("change", (e)=>{
  currentUser = e.target.value;

  document.getElementById("welcome").innerHTML =
    "👋 Bonjour " + currentUser;

  // 🔥 FIX : re-render immédiat
  db.ref("game").once("value").then(snapshot => {
    render(snapshot.val() || {});
  });
});


// ACTION SÉCURISÉE
function move(name, val){

 if(name !== currentUser){
   alert("⛔ Tu ne peux jouer que pour toi !");
   return;
 }

 db.ref("game/"+name).transaction(v => (v || 0) + val);

 db.ref("actions").push({
   agent: name,
   value: val,
   time: new Date().toLocaleTimeString()
 });
}


// RENDER
function render(data){

 const players = agents.map(a => ({
   ...a,
   pos: data[a.name] || 0
 }));

 const sorted = [...players].sort((a,b)=>b.pos-a.pos);

 let leaderBox = "";
 if(currentLeader && currentLeader !== sorted[0].name){
   leaderBox = `<div class="leader">🎉 Nouveau leader : ${sorted[0].name}</div>`;
 }
 currentLeader = sorted[0].name;

 let winner = "";
 if(sorted[0].pos >= FINISH){
   winner = `<h2>🏆 ${sorted[0].name} a gagné !!</h2>`;
 }

 let html = `
 <h1>🏁 Mario Kart Challenge</h1>

 ${leaderBox}
 ${winner}

 <div class="rules">
   ⚙️ +100 = Option<br>
   📱 +200 = Mobile<br>
   🏆 +300 = Win<br>
   🟢 +50 = Bonus<br>
   🔴 -100 = Erreur<br><br>
   🎯 Objectif : 2000 points
 </div>

 <h2>Classement</h2>
 ${sorted.map((p,i)=>`<div>${i+1}. ${p.name} (${p.pos})</div>`).join("")}

 <hr/>
 `;

 players.forEach(p => {

   html += `
   <div class="card ${p.name === currentLeader ? "gold":""}">
     <strong>${p.kart} ${p.name}</strong><br>
     Score: ${p.pos}<br><br>

     ${
       p.name === currentUser ?
       `
       <button onclick="move('${p.name}',100)">⚙️ +100</button>
       <button onclick="move('${p.name}',200)">📱 +200</button>
       <button onclick="move('${p.name}',300)">🏆 +300</button>
       <button onclick="move('${p.name}',50)">🟢 +50</button>
       <button onclick="move('${p.name}',-100)">🔴 -100</button>
       `
       :
       `<div style="opacity:0.3">🔒 Actions verrouillées</div>`
     }

     <div class="track">
       <div class="kart" style="left:${(p.pos/FINISH)*100}%">
         ${p.kart}
       </div>
     </div>

   </div>
   `;
 });

 document.getElementById("app").innerHTML = html;
}


// LIVE UPDATE
db.ref("game").on("value", snap => {
 render(snap.val() || {});
});

</script>

</body>
</html>
``
